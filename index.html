<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laundry Mart - Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <div class="left-section">
      <img
        src="https://static.vecteezy.com/system/resources/thumbnails/026/721/193/small/washing-machine-and-laundry-laundry-sticker-png.png"
        alt="Washing Machine"
      />
    </div>
    <div class="right-section">
      <div class="form-box">

        <h1>Hello Again!</h1>
        <p class="subtitle">Welcome back! we missed you!</p>

        <div class="input-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            placeholder="Emailid@site.com"
          />
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="Password"
          />
        </div>

        <div class="forgot-row">
          <a href="#">Forgot Password</a>
        </div>

        <button class="login-btn">Login</button>

        <div class="register-row">
          Not a member? <a href="#">Register Now</a>
        </div>

      </div>
    </div>

  </div>

</body>
</html>
